<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEG Claude Academy — Passwort zurücksetzen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root { --blue:#075DE4; --navy:#0A1A33; --paper:#FBFCFE; --bone:#E5EAF2; --muted:#4A5878; --rust:#C24A2C; --sage:#2E7D5C; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter Tight',-apple-system,sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:var(--paper);border-radius:16px;padding:48px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(10,26,51,.5);}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:40px;}
  .logo img{height:32px;}
  .logo-div{width:1px;height:22px;background:var(--bone);}
  .logo-p{font-family:'Fraunces',serif;font-size:14px;color:var(--navy);}
  .logo-s{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;}
  h1{font-family:'Fraunces',serif;font-weight:400;font-size:30px;color:var(--navy);margin-bottom:6px;}
  .sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5;}
  .fg{margin-bottom:18px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:7px;letter-spacing:.01em;}
  input{display:block;width:100%;height:46px;padding:0 14px;font-family:inherit;font-size:14px;line-height:46px;border:1px solid var(--bone);border-radius:8px;background:#fff;color:var(--navy);outline:none;transition:border-color .15s,box-shadow .15s;}
  input::placeholder{color:#9AA6BE;}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(7,93,228,.1);}
  .btn{display:block;width:100%;height:48px;padding:0;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
  .btn:hover{background:#2876F2;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;line-height:1.4;}
  .msg.show{display:block;}
  .err{background:#FEF1ED;color:var(--rust);border:1px solid rgba(194,74,44,.2);}
  .ok{background:#ECF6F1;color:var(--sage);border:1px solid rgba(46,125,92,.2);}
  .hint{text-align:center;font-size:13px;color:var(--muted);margin-top:14px;}
  .hint a{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:500;}
  .hint a:hover{text-decoration:underline;}
  .foot{margin-top:28px;padding-top:16px;border-top:1px solid var(--bone);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:center;letter-spacing:.04em;}
  #form{display:none;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="assets/ieg-logo.png" alt="IEG">
    <div class="logo-div"></div>
    <div>
      <div class="logo-p">Claude Academy</div>
      <div class="logo-s">Internal Training</div>
    </div>
  </div>

  <h1>Neues Passwort</h1>
  <p class="sub">Wähle ein neues Passwort für deinen Account.</p>

  <div id="msg" class="msg"></div>

  <div id="form">
    <div class="fg"><label>Neues Passwort</label><input type="password" id="p1" placeholder="Mindestens 8 Zeichen"></div>
    <div class="fg"><label>Passwort bestätigen</label><input type="password" id="p2" placeholder="Passwort wiederholen"></div>
    <button class="btn" id="saveB" onclick="doUpdate()">Passwort speichern</button>
  </div>

  <div class="hint"><a href="login.html">← Zurück zum Login</a></div>

  <div class="foot">© 2026 IEG Investment Banking Group</div>
</div>

<script>
  // Gemeinsamen Supabase-Client erstellen
  const sb = window.supabase.createClient(window._SB_URL, window._SB_KEY);

  function showMsg(text, type='err') {
    const el = document.getElementById('msg');
    if (!text) { el.className = 'msg'; return; }
    el.className = 'msg show ' + type;
    el.textContent = text;
  }

  // Recovery-Session aus dem Link herstellen, dann Formular freigeben
  async function initRecovery() {
    // PKCE-Flow: ?code=... gegen Session tauschen
    const params = new URLSearchParams(window.location.search);
    if (params.get('code')) {
      try { await sb.auth.exchangeCodeForSession(window.location.href); } catch (e) {}
    }
    // Implicit-Flow (#access_token=...) wird von supabase-js automatisch erkannt
    const { data } = await sb.auth.getSession();
    if (data && data.session) {
      document.getElementById('form').style.display = 'block';
    } else {
      showMsg('Dieser Link ist ungültig oder abgelaufen. Bitte fordere einen neuen Reset-Link an.');
    }
  }

  // Auch auf das PASSWORD_RECOVERY-Event reagieren
  sb.auth.onAuthStateChange((event, session) => {
    if (session) document.getElementById('form').style.display = 'block';
  });

  async function doUpdate() {
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    if (p1.length < 8) { showMsg('Passwort muss mindestens 8 Zeichen haben.'); return; }
    if (p1 !== p2) { showMsg('Die Passwörter stimmen nicht überein.'); return; }

    const b = document.getElementById('saveB');
    b.disabled = true; b.textContent = 'Wird gespeichert...'; showMsg('');

    try {
      const { error } = await sb.auth.updateUser({ password: p1 });
      if (error) throw error;
      showMsg('✓ Passwort geändert! Du wirst zum Login weitergeleitet.', 'ok');
      setTimeout(() => { window.location.href = 'login.html'; }, 1800);
    } catch (e) {
      showMsg('Fehler: ' + e.message);
      b.disabled = false; b.textContent = 'Passwort speichern';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doUpdate(); });

  initRecovery();
</script>
</body>
</html>
